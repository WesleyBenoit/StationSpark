name: Bug report
description: Report a problem with the StationSpark app
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please do not include personal data,
        access tokens, or exact location details. For security
        vulnerabilities, follow SECURITY.md instead of filing a public issue.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: When I tap "Send invite" at a station, ...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Tap ...
        3. See error
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - iOS
        - Android
        - Web
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App / build version
      placeholder: e.g. 0.1.0 (build 12)
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs (with secrets redacted), screenshots, or device details.
